<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beton - Font Outline Fixes v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #FEFEFE;
            color: #134095;
        }

        /* ---------------------------------------------------- */
        /* SOLUTION 2: Flawless Vector SVG Graphic              */
        /* ---------------------------------------------------- */
        .background-logo-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95vw; /* Increased size */
            max-width: 1400px; /* Increased size */
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }

        /* Responsive tweaks */
        @media (max-width: 768px) {
            .background-logo-img {
                display: none; /* User requested hidden on mobile */
            }
        }
    </style>
</head>
<body class="bg-[#FEFEFE]">

    <div class="py-8 bg-slate-50 border-b border-[#134095]/10 px-8 text-center text-xs font-bold uppercase tracking-wider text-[#134095]/60">
        Final Solution: Flawless Vector SVG Graphic
    </div>
    <section class="relative py-32 md:py-48 px-8 lg:px-16 text-center border-b border-[#134095]/15 overflow-hidden bg-white">
        
        <!-- Using the actual exported SVG file -->
        <img src="assets/images/beton-watermark.svg" class="background-logo-img hidden md:block" alt="Beton Watermark Vector" />
        
        <div class="relative max-w-4xl mx-auto z-10 flex flex-col items-center">
            <!-- Mobile Centered Logo -->
            <div class="block md:hidden mb-8">
                <img src="assets/images/Beton_logo.webp" alt="Beton Logo" class="h-16 object-contain rounded">
            </div>
            
            <span class="text-[10px] uppercase tracking-[0.4em] text-[#EF7F1A] mb-6 block">The Philosophy</span>
            <h1 class="text-4xl lg:text-5xl leading-tight mb-8 text-[#134095] font-bold">
                Lighting <span class="text-[#EF7F1A]">Beyond</span> <em class="italic font-light">Eternity.</em>
            </h1>
            <p class="text-lg text-[#134095]/70 leading-relaxed font-light max-w-3xl">
                At Beton, we believe lighting is more than illumination - it is an essential part of architecture that shapes experiences, enhances spaces, and brings ideas to life.
            </p>
        </div>
    </section>

</body>
</html>
